<!DOCTYPE html>
<html lang="en">
<head>
    <script>
        let dados = [10, 20, 30, 40, 50];
        let procurado = 30;
        let posicao = -1;

        for (let i = 0; i < dados.length; i++) {
            if (dados[i] === procurado) {
                posicao = i;
                break;
            }
        }

        if (posicao == -1)
         console.log('Elemento = ' + procurado + 'não encontrado');
        else 
        console.log('Elemento = ' + procurado + 'encontrado na posição' + posicao);
        
    </script>
</head>

</body>
</html>
